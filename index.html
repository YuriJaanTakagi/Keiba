<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3R競馬 - パーティー競馬ゲーム</title>
<style>
:root{
  --turf:#0d3320;
  --turf2:#11402a;
  --board:#101c33;
  --board-line:#2a3c5f;
  --led:#ffd23f;
  --led-green:#54e08a;
  --ink:#f2efe4;
  --dim:#9aa7c2;
  --red:#e5484d;
  --blue:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:repeating-linear-gradient(90deg,var(--turf) 0 90px,var(--turf2) 90px 180px);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
  touch-action:manipulation;
  -webkit-user-select:none;user-select:none;
  overscroll-behavior:none;
  line-height:1.5;
}
.num{font-family:"Courier New",ui-monospace,monospace;font-weight:bold;letter-spacing:.02em;}

/* ===== 横持ちガイド ===== */
#orient{display:none;position:fixed;inset:0;z-index:999;background:var(--board);
  color:var(--led);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px;}
#orient .rot{font-size:52px;animation:rot 1.6s ease-in-out infinite;}
@keyframes rot{0%,20%{transform:rotate(0)}60%,100%{transform:rotate(90deg)}}
@media (orientation:portrait) and (max-width:820px){ #orient{display:flex;} }

/* ===== 共通レイアウト ===== */
#app{max-width:960px;margin:0 auto;padding:10px 12px calc(24px + env(safe-area-inset-bottom));min-height:100%;}
.screen{animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ===== 電光掲示板パネル ===== */
.board{
  background:var(--board);
  border:4px solid #05101f;
  outline:2px solid var(--board-line);
  border-radius:6px;
  box-shadow:0 6px 0 rgba(0,0,0,.35);
  padding:12px 14px;
  margin-bottom:14px;
  position:relative;
}
.board::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:3px;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:4px 4px;}
.board-title{
  display:flex;align-items:center;gap:8px;
  color:var(--led-green);font-size:13px;font-weight:bold;letter-spacing:.18em;
  border-bottom:2px solid var(--board-line);padding-bottom:6px;margin-bottom:10px;
}
.board-title::before{content:"▶";font-size:10px;}
.led{color:var(--led);text-shadow:0 0 8px rgba(255,210,63,.45);}
.led-g{color:var(--led-green);text-shadow:0 0 8px rgba(84,224,138,.4);}

/* ===== ボタン ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:46px;padding:8px 18px;
  font-size:16px;font-weight:bold;color:var(--ink);
  background:#1c2b4a;border:3px solid #0a1526;border-radius:6px;
  box-shadow:0 4px 0 #0a1526;cursor:pointer;
  font-family:inherit;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #0a1526;}
.btn-primary{background:var(--red);border-color:#7e1a20;box-shadow:0 4px 0 #7e1a20;color:#fff;}
.btn-primary:active{box-shadow:0 1px 0 #7e1a20;}
.btn-go{background:#1c7a43;border-color:#0b3a1f;box-shadow:0 4px 0 #0b3a1f;color:#fff;}
.btn-go:active{box-shadow:0 1px 0 #0b3a1f;}
.btn-sm{min-height:38px;padding:4px 12px;font-size:14px;}
.btn[disabled]{opacity:.35;pointer-events:none;}
.btn-wide{width:100%;}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
.btnrow .btn{flex:1;}

/* ===== タイトル ===== */
.title-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;}
.title-logo{
  font-size:min(15vw,84px);font-weight:900;line-height:1.1;letter-spacing:.06em;
  color:var(--led);text-shadow:0 0 18px rgba(255,210,63,.5),4px 4px 0 #05101f;
}
.title-sub{color:var(--led-green);letter-spacing:.4em;margin:10px 0 30px;font-size:14px;font-weight:bold;}
.blink{animation:blink 1.1s steps(2) infinite;}
@keyframes blink{50%{opacity:0}}

/* ===== フォーム ===== */
label.fld{display:block;font-size:13px;color:var(--dim);font-weight:bold;margin:10px 0 4px;}
input[type=text],select{
  width:100%;min-height:46px;padding:6px 10px;font-size:16px;
  background:#0a1526;color:var(--ink);border:2px solid var(--board-line);border-radius:6px;
  font-family:inherit;-webkit-user-select:text;user-select:text;
}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
@media (max-width:640px){.setup-grid{grid-template-columns:1fr;}}

/* ===== 出走表 ===== */
table.tbl{width:100%;border-collapse:collapse;font-size:14px;}
table.tbl th{color:var(--dim);font-size:11px;letter-spacing:.1em;text-align:left;padding:4px 6px;border-bottom:2px solid var(--board-line);}
table.tbl td{padding:6px;border-bottom:1px solid #1a2742;vertical-align:middle;}
table.tbl tr:last-child td{border-bottom:none;}
.td-r{text-align:right;}
.waku{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:4px;font-weight:900;font-size:14px;
  border:2px solid rgba(0,0,0,.5);
}
.carry-badge{
  display:inline-block;background:#3a2606;border:2px solid var(--led);color:var(--led);
  border-radius:4px;padding:2px 8px;font-size:12px;font-weight:bold;margin:2px 4px 2px 0;
  animation:blink 1.4s steps(2) infinite;
}

/* ===== 投票画面 ===== */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tab{
  flex:1;min-width:74px;min-height:44px;font-size:14px;font-weight:bold;
  background:#0a1526;color:var(--dim);border:2px solid var(--board-line);border-radius:6px;
  font-family:inherit;cursor:pointer;
}
.tab.on{background:var(--red);border-color:#7e1a20;color:#fff;}
.hgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
@media (max-width:560px){.hgrid{grid-template-columns:repeat(5,1fr);gap:4px;}}
.hbtn{
  position:relative;min-height:52px;padding:3px 2px;border-radius:6px;cursor:pointer;
  background:#0a1526;border:2px solid var(--board-line);color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  font-family:inherit;
}
.hbtn .hb-num{font-weight:900;font-size:16px;line-height:1;}
.hbtn .hb-name{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;max-width:100%;}
.hbtn .hb-odds{font-size:9px;color:var(--led);}
.hbtn.sel{background:#3a2606;border-color:var(--led);}
.hbtn .ord{
  position:absolute;top:-7px;right:-5px;width:20px;height:20px;border-radius:50%;
  background:var(--red);color:#fff;font-size:12px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;border:2px solid #05101f;
}
.selinfo{margin:8px 0;font-size:14px;min-height:22px;}
.stepper{display:flex;align-items:center;gap:8px;margin:8px 0;}
.stepper .btn{min-width:52px;}
.stepper .cnt{font-size:22px;min-width:120px;text-align:center;}
.betlist{font-size:13px;}
.betlist .brow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a2742;}
.betlist .brow:last-child{border-bottom:none;}
.betlist .del{margin-left:auto;}
.money-bar{
  position:sticky;top:0;z-index:5;display:flex;gap:14px;align-items:center;
  background:var(--board);border:3px solid #05101f;outline:2px solid var(--board-line);
  border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:14px;font-weight:bold;
}
.money-bar .sp{margin-left:auto;}

/* ===== レース ===== */
#racewrap{position:relative;border:4px solid #05101f;outline:2px solid var(--board-line);border-radius:6px;overflow:hidden;background:#0b2b1a;}
#racecv{display:block;width:100%;height:auto;}
#race-topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
#race-overlay{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:rgba(5,16,31,.82);text-align:center;padding:16px;
}
#race-overlay.show{display:flex;}
.res-line{font-size:20px;font-weight:900;display:flex;align-items:center;gap:10px;}

/* ===== 結果 ===== */
.pay-row{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid #1a2742;font-size:14px;flex-wrap:wrap;}
.pay-row:last-child{border-bottom:none;}
.pay-type{width:64px;font-weight:bold;color:var(--dim);flex-shrink:0;}
.pay-combo{font-weight:900;min-width:90px;}
.pay-yen{margin-left:auto;font-size:17px;}
.pl-head{display:flex;align-items:baseline;gap:10px;font-weight:900;font-size:15px;margin-bottom:4px;}
.pl-head .bal{margin-left:auto;}
.plus{color:var(--led-green);}
.minus{color:#ff8d93;}
.hit-tag{display:inline-block;background:var(--red);color:#fff;border-radius:4px;font-size:11px;padding:1px 6px;font-weight:bold;}
.miss-tag{display:inline-block;background:#26324e;color:var(--dim);border-radius:4px;font-size:11px;padding:1px 6px;font-weight:bold;}
.ref-tag{display:inline-block;background:#1c5a8a;color:#fff;border-radius:4px;font-size:11px;padding:1px 6px;font-weight:bold;}

/* ===== 最終結果 ===== */
.rank-row{display:flex;align-items:center;gap:14px;padding:12px 8px;border-bottom:1px solid #1a2742;font-size:17px;font-weight:bold;}
.rank-row .rk{width:56px;font-size:20px;}
.rank-row .mn{margin-left:auto;}
.rank-1{background:linear-gradient(90deg,rgba(255,210,63,.16),transparent);font-size:20px;}
.rank-1 .rk{color:var(--led);text-shadow:0 0 10px rgba(255,210,63,.6);}
.champ{font-size:15px;color:var(--led);text-align:center;margin:4px 0 12px;font-weight:900;letter-spacing:.2em;}

.note{font-size:12px;color:var(--dim);margin-top:8px;}
.center{text-align:center;}
h2.scr-title{font-size:18px;letter-spacing:.15em;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
h2.scr-title .rno{background:var(--red);color:#fff;border-radius:4px;padding:2px 10px;font-size:14px;}
</style>
</head>
<body>
<div id="orient">
  <div class="rot">📱</div>
  <div style="font-size:20px;font-weight:900;letter-spacing:.2em;">よこにしてね</div>
  <div style="font-size:13px;color:var(--dim);">このゲームは横持ちであそびます</div>
</div>
<div id="app"></div>
<script>
"use strict";
/* =====================================================
   3R競馬  -  単一HTMLパーティー競馬ゲーム
   パリミュチュエル方式(控除率0% / キャリーオーバーあり)
===================================================== */

/* ---------- 定数 ---------- */
const BET_TYPES = {
  tansho:     {label:"単勝",   picks:1, ordered:false, hint:"1着になる馬"},
  fukusho:    {label:"複勝",   picks:1, ordered:false, hint:"3着以内に入る馬"},
  umaren:     {label:"馬連",   picks:2, ordered:false, hint:"1・2着の組合せ(順不同)"},
  umatan:     {label:"馬単",   picks:2, ordered:true,  hint:"1着→2着を着順どおり"},
  wide:       {label:"ワイド", picks:2, ordered:false, hint:"3着以内に入る2頭(順不同)"},
  sanrenpuku: {label:"三連複", picks:3, ordered:false, hint:"1〜3着の組合せ(順不同)"},
  sanrentan:  {label:"三連単", picks:3, ordered:true,  hint:"1着→2着→3着を着順どおり"},
};
const TYPE_KEYS = Object.keys(BET_TYPES);
const UNIT = 100;
const N_HORSES = 15;
const N_RACES = 3;
const WAKU_COLORS = ["", "#f5f5f5", "#1c1c1c", "#e5484d", "#2f6fed", "#f2c522", "#2fa858", "#f07f2d", "#f078b0"];
const WAKU_TEXT   = ["", "#111",    "#fff",    "#fff",    "#fff",    "#111",    "#fff",    "#fff",    "#fff"];

/* ---------- 状態 ---------- */
const S = {
  players: [],        // {name, money}
  startMoney: 5000,
  raceNo: 1,
  horses: [],         // {num, name, p, refOdds}
  bets: [],           // 今レース確定分 {pid,type,sel,units,amount,payout,refund,hit}
  carry: {},          // 券種 -> キャリーオーバー額
  order: [],          // 着順(馬番の配列)
  curPlayer: 0,
  lastSettle: null,
};

/* ---------- ユーティリティ ---------- */
const $ = (sel) => document.querySelector(sel);
const app = () => document.getElementById("app");
const yen = (n) => n.toLocaleString("ja-JP") + "円";
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function randn(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
const wakuOf = (num) => Math.floor((num + 2) / 2);   // 15頭立て: 枠1=馬1, 枠2〜8=各2頭
function wakuChip(num){
  const w = wakuOf(num);
  return `<span class="waku" style="background:${WAKU_COLORS[w]};color:${WAKU_TEXT[w]}">${num}</span>`;
}
function sameSet(a, b){
  if(a.length !== b.length) return false;
  const x=[...a].sort((p,q)=>p-q), y=[...b].sort((p,q)=>p-q);
  return x.every((v,i)=>v===y[i]);
}
function comboKey(type, sel){
  const def = BET_TYPES[type];
  const s = def.ordered ? sel : [...sel].sort((a,b)=>a-b);
  return type + ":" + s.join("-");
}
function comboText(type, sel){
  const def = BET_TYPES[type];
  const s = def.ordered ? sel : [...sel].sort((a,b)=>a-b);
  return s.join(def.ordered ? "→" : "-");
}

/* ---------- BOX買い(組合せ展開) ---------- */
let GID = 0;
function combosOf(arr, k){
  const res = [];
  const rec = (start, cur) => {
    if(cur.length === k){ res.push([...cur]); return; }
    for(let i=start; i<arr.length; i++){ cur.push(arr[i]); rec(i+1, cur); cur.pop(); }
  };
  rec(0, []);
  return res;
}
function permsOf(arr, k){
  const res = [];
  const rec = (cur) => {
    if(cur.length === k){ res.push([...cur]); return; }
    for(const a of arr){ if(!cur.includes(a)){ cur.push(a); rec(cur); cur.pop(); } }
  };
  rec([]);
  return res;
}
function expandCombos(type, sel, forceBox){
  const def = BET_TYPES[type];
  if(def.picks === 1) return sel.map(n => [n]);
  if(sel.length === def.picks && !forceBox) return [[...sel]];   // ちょうど+BOX指定なし → タップ順
  const sorted = [...sel].sort((a,b)=>a-b);
  return def.ordered ? permsOf(sorted, def.picks) : combosOf(sorted, def.picks);
}
function groupBets(list){
  const map = new Map();
  list.forEach(b => { const k = b.gid; if(!map.has(k)) map.set(k, []); map.get(k).push(b); });
  return [...map.values()];
}

/* ---------- 馬名生成 ---------- */
const NAME_PRE = ["サニー","コスモ","ハル","ミカヅキ","テン","ダイヤ","ライト","ウィン","フジ","ヤマト",
  "エア","ニシノ","キタ","マチカネ","スター","ゴールド","シルバー","ブラック","レッド","グリーン",
  "サツキ","ホシ","カゼ","ツキ","ソラ","ユキ","アカツキ","イナズマ","ハヤテ","オオゾラ"];
const NAME_SUF = ["アロー","ドリーム","フレイム","ウインド","ストーム","ダッシュ","スピリット","ロード",
  "フラッシュ","ハート","ソング","ブレイブ","シチー","バクシン","クロス","ボルト","ランナー","スマイル",
  "ガッツ","チャンス","エース","キング","クイーン","パレード","マーチ"];
function genNames(n){
  const used = new Set(), out = [];
  while(out.length < n){
    const name = NAME_PRE[Math.floor(Math.random()*NAME_PRE.length)]
               + NAME_SUF[Math.floor(Math.random()*NAME_SUF.length)];
    if(name.length <= 9 && !used.has(name)){ used.add(name); out.push(name); }
  }
  return out;
}

/* ---------- 馬生成・着順決定 ---------- */
function genHorses(){
  const raw = Array.from({length:N_HORSES}, () => Math.exp(randn()));
  const sum = raw.reduce((a,b)=>a+b, 0);
  const names = genNames(N_HORSES);
  const horses = raw.map((s,i) => {
    const p = s / sum;
    return { num:i+1, name:names[i], p, refOdds: oddsFromProb(p) };
  });
  // 人気 = 単勝オッズ昇順(確率降順)
  [...horses].sort((a,b)=>b.p-a.p).forEach((h,i)=>{ h.pop = i+1; });
  return horses;
}
function decideOrder(horses){
  const rem = horses.map(h => ({num:h.num, p:h.p}));
  const order = [];
  while(rem.length){
    const tot = rem.reduce((a,h)=>a+h.p, 0);
    let r = Math.random() * tot, idx = rem.length - 1;
    for(let i=0;i<rem.length;i++){ r -= rem[i].p; if(r <= 0){ idx = i; break; } }
    order.push(rem[idx].num);
    rem.splice(idx,1);
  }
  return order;
}

/* ---------- 的中判定 ---------- */
function isHit(bet, order){
  const top3 = order.slice(0,3), s = bet.sel;
  switch(bet.type){
    case "tansho":     return s[0] === order[0];
    case "fukusho":    return top3.includes(s[0]);
    case "umaren":     return sameSet(s, order.slice(0,2));
    case "umatan":     return s[0]===order[0] && s[1]===order[1];
    case "wide":       return s.every(n => top3.includes(n));
    case "sanrenpuku": return sameSet(s, top3);
    case "sanrentan":  return s[0]===order[0] && s[1]===order[1] && s[2]===order[2];
  }
  return false;
}

/* ---------- 確率オッズ(固定オッズ・払戻率100%) ---------- */
function oddsFromProb(pr){ return Math.max(1.1, Math.round(1/pr*10)/10); }
function probOf(type, sel){
  const P = {}; S.horses.forEach(h => P[h.num] = h.p);
  const p2 = (i,j) => P[i] * P[j] / (1 - P[i]);                              // i→j の順
  const p3 = (i,j,k) => P[i] * (P[j]/(1-P[i])) * (P[k]/(1-P[i]-P[j]));       // i→j→k の順
  const perm3 = (a,b,c) => p3(a,b,c)+p3(a,c,b)+p3(b,a,c)+p3(b,c,a)+p3(c,a,b)+p3(c,b,a);
  const s = sel;
  switch(type){
    case "tansho":     return P[s[0]];
    case "umatan":     return p2(s[0], s[1]);
    case "umaren":     return p2(s[0], s[1]) + p2(s[1], s[0]);
    case "sanrentan":  return p3(s[0], s[1], s[2]);
    case "sanrenpuku": return perm3(s[0], s[1], s[2]);
    case "wide": {
      let t = 0;
      S.horses.forEach(h => { if(h.num !== s[0] && h.num !== s[1]) t += perm3(s[0], s[1], h.num); });
      return t;
    }
    case "fukusho": {
      const i = s[0];
      let t = P[i];                                                          // 1着
      S.horses.forEach(hj => {
        const j = hj.num; if(j === i) return;
        t += P[j] * P[i] / (1 - P[j]);                                       // 2着
        S.horses.forEach(hk => {
          const k = hk.num; if(k === i || k === j) return;
          t += P[j] * (P[k]/(1-P[j])) * (P[i]/(1-P[j]-P[k]));                // 3着
        });
      });
      return t;
    }
  }
  return 0;
}
function oddsOf(type, sel){ return oddsFromProb(probOf(type, sel)); }

/* ---------- 清算(固定オッズ + 共通キャリーオーバー) ----------
   ・的中: 賭け金 × オッズ を払い戻し
   ・的中者ゼロの券種: その券種の購入総額を共通キャリーへ合算
   ・レース開始時点のキャリー: そのレースで的中した全票に賭け金比で山分け
   ・第3レースで的中者ゼロ: 残キャリーを当レース購入者へ購入比で返還       */
function settle(order, opt){
  opt = opt || {};
  const bets   = opt.bets || S.bets;
  const raceNo = opt.raceNo || S.raceNo;
  const potIn  = (opt.carryIn !== undefined) ? opt.carryIn : S.carry;
  const info = { types:{}, potDistributed:0, potRefunded:false, carryNext:0 };
  const hitsAll = [];
  for(const t of TYPE_KEYS){
    const tb = bets.filter(b => b.type === t);
    if(!tb.length) continue;
    const total = tb.reduce((a,b)=>a+b.amount, 0);
    tb.forEach(b => { b.hit = isHit(b, order); b.payout = 0; b.refund = 0; b.carryBonus = 0; });
    const hits = tb.filter(b => b.hit);
    hits.forEach(b => { b.payout = Math.round(b.amount * b.odds); });
    hitsAll.push(...hits);
    info.types[t] = { total, hits, toPot: hits.length ? 0 : total };
  }
  let pot = potIn;
  if(pot > 0 && hitsAll.length){
    const hitAmt = hitsAll.reduce((a,b)=>a+b.amount, 0);
    hitsAll.forEach(b => { b.carryBonus = Math.round(pot * b.amount / hitAmt); });
    info.potDistributed = pot;
    pot = 0;
  }
  for(const t in info.types){ pot += info.types[t].toPot; }
  if(raceNo >= N_RACES && pot > 0){
    const total = bets.reduce((a,b)=>a+b.amount, 0);
    if(total > 0){
      bets.forEach(b => { b.refund = (b.refund||0) + Math.round(pot * b.amount / total); });
      info.potRefunded = true;
    }
    pot = 0;
  }
  info.carryNext = pot;
  return info;
}

const B = { type:"tansho", sel:[], units:1, myBets:[], boxOn:false, warn:"" };

function renderBet(){
  B.type = "tansho"; B.sel = []; B.units = 1; B.myBets = []; B.boxOn = false; B.warn = "";
  drawBet();
}
function myTotal(){ return B.myBets.reduce((a,b)=>a+b.amount, 0); }
function remainMoney(){ return S.players[S.curPlayer].money - myTotal(); }

function drawBet(){
  const p = S.players[S.curPlayer];
  if(p.money < UNIT && B.myBets.length === 0){
    app().innerHTML = `
    <div class="screen title-wrap" style="min-height:60vh;">
      <div class="title-logo" style="font-size:min(9vw,44px);">${esc(p.name)}</div>

      <button class="btn btn-primary" style="min-width:220px;" onclick="confirmBets()">見送って次へ</button>
    </div>`;
    return;
  }
  const def = BET_TYPES[B.type];
  const slotLabels = ["1着","2着","3着"];
  const nSel = B.sel.length;
  const forceBox = def.ordered && def.picks > 1 && B.boxOn;
  const combos = nSel >= def.picks ? expandCombos(B.type, B.sel, forceBox) : [];
  const nPts = combos.length;
  const isBox = nSel > def.picks || (forceBox && nSel >= def.picks);
  let selInfo;
  if(nSel < def.picks){
    selInfo = def.picks === 1
      ? "馬をえらんでね(複数えらぶと全頭購入)"
      : `あと${def.picks - nSel}頭えらんでね(多めにえらぶとBOX買い)`;
  } else if(!isBox){
    const od = oddsOf(B.type, combos[0]);
    selInfo = ((def.ordered && def.picks > 1)
      ? slotLabels.slice(0, def.picks).map((l,i)=>`${l}:<b>${B.sel[i]}</b>`).join("　")
      : `選択中: <b>${[...B.sel].sort((a,b)=>a-b).join("-")}</b>`)
      + `　<span class="led num">${od.toFixed(1)}倍</span>`;
  } else {
    const os = combos.map(c => oddsOf(B.type, c));
    const lo = Math.min(...os), hi = Math.max(...os);
    const boxLabel = def.picks === 1 ? `${nSel}頭それぞれ購入` : "BOX買い";
    selInfo = `<b>${[...B.sel].sort((a,b)=>a-b).join("-")}</b>　<span class="led">${boxLabel} 全${nPts}点</span>　<span class="led num">${lo.toFixed(1)}〜${hi.toFixed(1)}倍</span>`;
  }
  const perUnit = Math.max(1, nPts) * UNIT;                 // 1口あたり(全点分)
  const maxUnits = Math.max(1, Math.floor(remainMoney() / perUnit));
  if(B.units > maxUnits) B.units = maxUnits;
  const amount = B.units * perUnit;
  const canAdd = nPts > 0 && amount <= remainMoney();

  app().innerHTML = `
  <div class="screen">
    <div class="money-bar">
      <span>${esc(p.name)}</span>
      <span style="font-size:12px;color:var(--dim);">第${S.raceNo}R</span>
      <span class="sp num">残り <span class="led">${yen(remainMoney())}</span></span>
    </div>
    ${S.carry > 0 ? `<div class="board" style="padding:8px 12px;"><span class="carry-badge">キャリーオーバー +${yen(S.carry)}</span><span style="font-size:12px;color:var(--dim);"> このレースの的中者全員で山分け</span></div>` : ""}

    <div class="board">
      <div class="board-title">券種をえらぶ</div>
      <div class="tabs">
        ${TYPE_KEYS.map(t=>`<button class="tab ${t===B.type?"on":""}" onclick="setBetType('${t}')">${BET_TYPES[t].label}</button>`).join("")}
      </div>
      <div style="font-size:12px;color:var(--dim);">${def.label}: ${def.hint}</div>
    </div>

    <div class="board">
      <div class="board-title" style="justify-content:space-between;">
        <span>馬をえらぶ ${def.ordered && def.picks>1 && !isBox ? "(タップした順に着順)" : ""}${isBox && def.picks>1 ? `(BOX: 全${def.ordered ? "順列" : "組合せ"}を購入)` : ""}</span>
        ${def.ordered && def.picks>1 ? `<button class="tab ${isBox?"on":""}" style="flex:none;min-width:88px;min-height:34px;font-size:13px;letter-spacing:.05em;" onclick="toggleBox()">BOX ${isBox?"ON":"OFF"}</button>` : ""}
      </div>
      <div class="hgrid">
        ${S.horses.map(h=>{
          const i = B.sel.indexOf(h.num);
          return `<button class="hbtn ${i>=0?"sel":""}" onclick="tapHorse(${h.num})">
            ${i>=0 && def.picks>1 && def.ordered && !isBox && !B.boxOn ? `<span class="ord">${i+1}</span>`:""}
            <span class="waku" style="width:22px;height:22px;font-size:13px;background:${WAKU_COLORS[wakuOf(h.num)]};color:${WAKU_TEXT[wakuOf(h.num)]}">${h.num}</span>
            <span class="hb-name">${h.pop}人気 ${h.name.slice(0,4)}</span>
            <span class="hb-odds num">${(def.picks===1 ? oddsOf(B.type,[h.num]) : h.refOdds).toFixed(1)}</span>
          </button>`;
        }).join("")}
      </div>
      <div class="selinfo">${B.warn ? `<span class="minus">⚠ ${B.warn}</span>` : selInfo}</div>
      <div class="stepper">
        <button class="btn btn-sm" onclick="chgUnits(-1)">−</button>
        <span class="cnt num led">${B.units}口${nPts>1?`×${nPts}点`:""} / ${yen(amount)}</span>
        <button class="btn btn-sm" onclick="chgUnits(1)">＋</button>
        <button class="btn btn-sm" onclick="chgUnits(10)">＋10</button>
      </div>
      <button class="btn btn-go btn-wide" ${canAdd?"":"disabled"} onclick="addBet()">買い目に追加</button>
    </div>

    <div class="board">
      <div class="board-title">買い目リスト (計 ${yen(myTotal())})</div>
      <div class="betlist">
        ${B.myBets.length ? groupBets(B.myBets).map(g=>{
          const b = g[0];
          if(g.length === 1 && !b.box){
            return `<div class="brow">
              <span style="width:56px;font-weight:bold;color:var(--dim);">${BET_TYPES[b.type].label}</span>
              <span style="font-weight:900;">${comboText(b.type,b.sel)}</span>
              <span class="num">${b.units}口</span>
              <span class="num">${yen(b.amount)}</span>
              <span class="num led" style="font-size:12px;">${b.odds.toFixed(1)}倍</span>
              <button class="btn btn-sm del" onclick="delBet(${b.gid})">✕</button>
            </div>`;
          }
          const sum = g.reduce((a,x)=>a+x.amount,0);
          const lo = Math.min(...g.map(x=>x.odds)), hi = Math.max(...g.map(x=>x.odds));
          return `<div class="brow">
            <span style="width:56px;font-weight:bold;color:var(--dim);">${BET_TYPES[b.type].label}</span>
            <span style="font-weight:900;">BOX ${b.boxSel.join("-")}</span>
            <span class="num">${g.length}点×${b.units}口</span>
            <span class="num">${yen(sum)}</span>
            <span class="num led" style="font-size:12px;">${lo.toFixed(1)}〜${hi.toFixed(1)}倍</span>
            <button class="btn btn-sm del" onclick="delBet(${b.gid})">✕</button>
          </div>`;
        }).join("") : `<div style="color:var(--dim);font-size:13px;">まだ買い目がありません(見送りもOK)</div>`}
      </div>
      <div class="note">オッズは確定値。的中したら 賭け金×オッズ が払い戻されます。</div>
    </div>
    <button class="btn btn-primary btn-wide" onclick="confirmBets()">投票を確定する</button>
  </div>`;
}
function setBetType(t){ B.type = t; B.sel = []; B.boxOn = false; B.warn = ""; drawBet(); }
function tapHorse(num){
  const def = BET_TYPES[B.type];
  const i = B.sel.indexOf(num);
  B.warn = "";
  if(i >= 0){ B.sel.splice(i,1); drawBet(); return; }
  const next = [...B.sel, num];
  if(next.length >= def.picks){
    const forceBox = def.ordered && def.picks > 1 && B.boxOn;
    const nPts = expandCombos(B.type, next, forceBox).length;
    if(nPts * UNIT > remainMoney()){
      B.warn = `残高不足: この馬を足すと${nPts}点×100円=${yen(nPts*UNIT)}が必要です`;
      drawBet(); return;
    }
  }
  B.sel.push(num);
  drawBet();
}
function toggleBox(){ B.boxOn = !B.boxOn; B.warn = ""; drawBet(); }
function chgUnits(d){
  const def = BET_TYPES[B.type];
  const forceBox = def.ordered && def.picks > 1 && B.boxOn;
  const nPts = Math.max(1, B.sel.length >= def.picks ? expandCombos(B.type, B.sel, forceBox).length : 1);
  const maxUnits = Math.max(1, Math.floor(remainMoney() / (nPts * UNIT)));
  B.units = Math.min(maxUnits, Math.max(1, B.units + d));
  drawBet();
}
function addBet(){
  const def = BET_TYPES[B.type];
  const forceBox = def.ordered && def.picks > 1 && B.boxOn;
  const combos = expandCombos(B.type, B.sel, forceBox);
  const gid = ++GID;
  const box = combos.length > 1;
  const boxSel = [...B.sel].sort((a,b)=>a-b);
  combos.forEach(sel => {
    B.myBets.push({ pid:S.curPlayer, type:B.type, sel, units:B.units, amount:B.units*UNIT, gid, box, boxSel, odds: oddsOf(B.type, sel) });
  });
  B.sel = []; B.units = 1;
  drawBet();
}
function delBet(gid){ B.myBets = B.myBets.filter(b => b.gid !== gid); drawBet(); }
function confirmBets(){
  const p = S.players[S.curPlayer];
  p.money -= myTotal();
  S.bets.push(...B.myBets);
  S.curPlayer++;
  if(S.curPlayer < S.players.length){ go("handoff"); }
  else { go("race"); }
}

const RACE = { anim:null };

function renderRace(){

      </div>
    </div>

  </div>`;

function startRaceAnim(){
  S.order = decideOrder(S.horses);
  const cv = $("#racecv"), ctx = cv.getContext("2d");
  const W = cv.width, H = cv.height;
  const laneTop = 60, laneH = 30;
  const L = 2600, startX = 60, goalX = startX + L;
  const DUR = 16;                       // 勝ち馬のゴールタイム(秒)
  // 着順ごとのゴールタイム(単調増加)
  const tFin = {};
  let t = DUR;
  S.order.forEach((num, rank) => {
    if(rank > 0) t += 0.25 + Math.random() * 0.45;
    tFin[num] = t;
  });
  const wob = {};
  S.horses.forEach(h => { wob[h.num] = { a: 14 + Math.random()*14, w: 1.2 + Math.random()*1.2, ph: Math.random()*6.28 }; });

  const state = { start: performance.now(), speed: 1, done: false, offset: 0 };
  RACE.anim = state;

  function horseX(num, sec){
    const prog = sec / tFin[num];
    const wf = Math.max(0, 1 - prog);
    const w = wob[num];
    return startX + L * prog + w.a * Math.sin(sec * w.w + w.ph) * wf;
  }
  function drawFrame(){
    if(state !== RACE.anim) return;   // 画面遷移後は停止
    const sec = state.offset + (performance.now() - state.start) / 1000 * state.speed;
    // カメラ: 先頭馬を追う
    let maxX = 0;
    S.horses.forEach(h => { maxX = Math.max(maxX, horseX(h.num, sec)); });
    const cam = Math.min(Math.max(0, maxX - W * 0.68), goalX + 240 - W);

    // 背景
    ctx.fillStyle = "#0b2b1a"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "#123d26"; ctx.fillRect(0,0,W,laneTop-14);           // 奥の芝
    for(let i=0;i<N_HORSES;i++){
      ctx.fillStyle = i%2 ? "#1d5c38" : "#237045";
      ctx.fillRect(0, laneTop + i*laneH, W, laneH);
    }
    // ラチ(柵)
    ctx.fillStyle = "#e8e4d4";
    ctx.fillRect(0, laneTop-8, W, 5);
    ctx.fillRect(0, laneTop + N_HORSES*laneH + 3, W, 5);
    // ハロン棒
    ctx.textAlign = "center"; ctx.font = "bold 12px monospace";
    for(let d=0; d<=L; d+=400){
      const x = startX + d - cam;
      if(x < -40 || x > W+40) continue;
      ctx.fillStyle = "rgba(255,255,255,.35)";
      ctx.fillRect(x, laneTop-8, 2, N_HORSES*laneH + 16);
      ctx.fillStyle = "#cfe8d8";
      ctx.fillText(`${(L-d)/2}m`, x, laneTop-18);
    }
    // ゴール板
    const gx = goalX - cam;
    if(gx > -60 && gx < W+60){
      for(let i=0;i<Math.ceil((N_HORSES*laneH+16)/12);i++){
        ctx.fillStyle = i%2 ? "#e5484d" : "#f2efe4";
        ctx.fillRect(gx, laneTop-8+i*12, 8, 12);
      }
      ctx.fillStyle = "#ffd23f"; ctx.font = "bold 14px sans-serif";
      ctx.fillText("GOAL", gx+4, laneTop-24);
    }
    // 馬
    ctx.textAlign = "center";
    S.horses.forEach((h, i) => {
      const x = horseX(h.num, sec) - cam;
      const y = laneTop + i*laneH + laneH/2;
      if(x < -60 || x > W+60) return;
      const leg = Math.floor(sec*10 + i) % 2;
      // 脚
      ctx.fillStyle = "#3d2314";
      if(leg){ ctx.fillRect(x-14,y+5,4,8); ctx.fillRect(x+8,y+5,4,8); }
      else   { ctx.fillRect(x-9,y+5,4,8);  ctx.fillRect(x+3,y+5,4,8); }
      // 胴体・首・頭
      ctx.fillStyle = ["#6b4226","#7a4a2b","#5a3a22","#8a5a35"][h.num % 4];
      ctx.fillRect(x-16, y-4, 30, 11);
      ctx.fillRect(x+12, y-10, 8, 10);
      ctx.fillRect(x+16, y-12, 9, 7);
      // 尻尾
      ctx.fillStyle = "#2c1a0e"; ctx.fillRect(x-20, y-4, 5, 8);
      // 騎手(帽色=枠色)
      const w = wakuOf(h.num);
      ctx.fillStyle = "#d8d2c0"; ctx.fillRect(x-4, y-13, 8, 9);
      ctx.fillStyle = WAKU_COLORS[w]; ctx.fillRect(x-4, y-17, 8, 5);
      // ゼッケン
      ctx.fillStyle = "#f2efe4"; ctx.fillRect(x-13, y-3, 12, 9);
      ctx.fillStyle = "#111"; ctx.font = "bold 9px monospace";
      ctx.fillText(h.num, x-7, y+4);
    });
    // 上部情報
    ctx.textAlign = "left";
    ctx.fillStyle = "rgba(5,16,31,.8)"; ctx.fillRect(0,0,W,26);
    ctx.fillStyle = "#54e08a"; ctx.font = "bold 13px monospace";
    const remain = Math.max(0, Math.round(goalX - maxX));
    ctx.fillText(`第${S.raceNo}レース 15頭 / 残り約${Math.ceil(remain/2/50)*50}m`, 10, 18);

    // 終了判定: 3着馬のゴール + 1秒
    const t3 = tFin[S.order[2]];
    if(!state.done && sec >= t3 + 1.0){
      state.done = true;
      showRaceResultOverlay();
    }
    if(sec < tFin[S.order[N_HORSES-1]] + 2){ requestAnimationFrame(drawFrame); }
  }
  requestAnimationFrame(drawFrame);
}
function skipRace(){
  const st = RACE.anim;
  if(!st || st.done) return;
  const now = performance.now();
  st.offset = st.offset + (now - st.start)/1000*st.speed;
  st.start = now;
  st.speed = 12;
}
function showRaceResultOverlay(){
  $("#race-top3").innerHTML = S.order.slice(0,3).map((num,i)=>{
    const h = S.horses.find(x=>x.num===num);
    return `<div class="res-line"><span style="width:52px;color:var(--dim);font-size:15px;">${i+1}着</span>${wakuChip(num)}<span>${h.name}</span></div>`;
  }).join("");
  $("#race-overlay").classList.add("show");
}

/* =====================================================
   画面: 結果・払い戻し
===================================================== */
function renderResult(){
  RACE.anim = null;
  const info = settle(S.order, { bets:S.bets, carryIn:S.carry, raceNo:S.raceNo });
  S.carry = info.carryNext;
  S.lastSettle = info;
  // 払い戻し・キャリー山分け・返還を残高に反映
  S.bets.forEach(b => { S.players[b.pid].money += (b.payout||0) + (b.carryBonus||0) + (b.refund||0); });

  const top3 = S.order.slice(0,3).map((num,i)=>{
    const h = S.horses.find(x=>x.num===num);
    return `<div class="res-line" style="padding:3px 0;"><span style="width:52px;color:var(--dim);font-size:14px;">${i+1}着</span>${wakuChip(num)}<span style="font-size:16px;">${h.name}</span><span style="font-size:12px;color:var(--dim);">${h.pop}人気</span></div>`;
  }).join("");

  const typeRows = TYPE_KEYS.filter(t=>info.types[t]).map(t=>{
    const d = info.types[t], label = BET_TYPES[t].label;
    if(d.hits.length){
      const seen = new Map();
      d.hits.forEach(b => { seen.set(comboText(b.type,b.sel), b.odds); });
      const combos = [...seen.entries()].map(([c,o])=>`${c} <span class="num led">${o.toFixed(1)}倍</span>`).join("　/　");
      return `<div class="pay-row"><span class="pay-type">${label}</span>
        <span class="pay-combo" style="min-width:0;">${combos}</span></div>`;
    }
    return `<div class="pay-row"><span class="pay-type">${label}</span>
      <span style="color:var(--dim);">的中なし</span>
      <span class="pay-yen" style="font-size:13px;"><span class="carry-badge" style="animation:none;">キャリーへ +${yen(d.toPot)}</span></span></div>`;
  }).join("") || `<div style="color:var(--dim);font-size:13px;">このレースの投票はありませんでした</div>`;

  const potRows =
    (info.potDistributed ? `<div class="pay-row"><span class="pay-type led">山分け</span><span style="font-size:13px;">キャリーオーバー <span class="num led">${yen(info.potDistributed)}</span> を的中者全員に賭け金比で分配</span></div>` : "") +
    (info.potRefunded ? `<div class="pay-row"><span class="pay-type">返還</span><span style="font-size:13px;color:var(--dim);">最終レースのため残キャリー分を購入者へ返還</span></div>` : "") +
    (info.carryNext ? `<div class="pay-row"><span class="pay-type">持越し</span><span class="carry-badge">次レースへ +${yen(info.carryNext)}</span></div>` : "");
  const payRows = typeRows + potRows;

  const playerBlocks = S.players.map((p,pi)=>{
    const myBets = S.bets.filter(b=>b.pid===pi);
    const spent = myBets.reduce((a,b)=>a+b.amount,0);
    const back  = myBets.reduce((a,b)=>a+(b.payout||0)+(b.carryBonus||0)+(b.refund||0),0);
    const diff = back - spent;
    const rows = myBets.length ? groupBets(myBets).map(g=>{
      const b = g[0];
      const carryTag = (x)=> x.carryBonus ? `<span class="ref-tag" style="background:#3a2606;color:var(--led);">ｷｬﾘｰ+${yen(x.carryBonus)}</span>` : "";
      if(g.length === 1 && !b.box){
        const tag = b.hit ? `<span class="hit-tag">的中 ${b.odds.toFixed(1)}倍</span>` : (b.refund ? `<span class="ref-tag">返還</span>` : `<span class="miss-tag">はずれ</span>`);
        const got = (b.payout||0) + (b.carryBonus||0) + (b.refund||0);
        return `<div class="brow" style="display:flex;gap:8px;padding:4px 0;font-size:13px;align-items:center;flex-wrap:wrap;">
          <span style="width:52px;color:var(--dim);font-weight:bold;">${BET_TYPES[b.type].label}</span>
          <span style="font-weight:900;">${comboText(b.type,b.sel)}</span>
          <span class="num">${yen(b.amount)}</span>${tag}${carryTag(b)}
          <span class="num" style="margin-left:auto;">${got ? "+"+yen(got) : ""}</span></div>`;
      }
      const sumG = g.reduce((a,x)=>a+x.amount,0);
      const gotG = g.reduce((a,x)=>a+(x.payout||0)+(x.carryBonus||0)+(x.refund||0),0);
      const detail = g.filter(x=>x.hit || x.refund || x.carryBonus).map(x=>{
        const tag = x.hit ? `<span class="hit-tag">的中 ${x.odds.toFixed(1)}倍</span>` : (x.refund ? `<span class="ref-tag">返還</span>` : "");
        return `<div style="display:flex;gap:8px;padding:2px 0 2px 60px;font-size:12px;align-items:center;flex-wrap:wrap;">
          <span style="font-weight:900;">${comboText(x.type,x.sel)}</span>${tag}${carryTag(x)}
          <span class="num" style="margin-left:auto;">+${yen((x.payout||0)+(x.carryBonus||0)+(x.refund||0))}</span></div>`;
      }).join("");
      return `<div style="padding:4px 0;border-bottom:1px solid #1a2742;">
        <div style="display:flex;gap:8px;font-size:13px;align-items:center;">
          <span style="width:52px;color:var(--dim);font-weight:bold;">${BET_TYPES[b.type].label}</span>
          <span style="font-weight:900;">BOX ${b.boxSel.join("-")}</span>
          <span class="num">${g.length}点 ${yen(sumG)}</span>
          ${gotG ? "" : `<span class="miss-tag">はずれ</span>`}
          <span class="num" style="margin-left:auto;">${gotG ? "+"+yen(gotG) : ""}</span>
        </div>${detail}</div>`;
    }).join("") : `<div style="font-size:13px;color:var(--dim);">見送り</div>`;
    return `<div class="board">
      <div class="pl-head">${esc(p.name)}
        <span style="font-size:13px;" class="${diff>=0?"plus":"minus"} num">収支 ${diff>=0?"+":""}${yen(diff)}</span>
        <span class="bal num">残高 <span class="led">${yen(p.money)}</span></span></div>
      ${rows}</div>`;
  }).join("");

  app().innerHTML = `
  <div class="screen">
    <h2 class="scr-title"><span class="rno">第${S.raceNo}レース</span><span class="led">結果・払い戻し</span></h2>
    <div class="board"><div class="board-title">着順</div>${top3}</div>
    <div class="board"><div class="board-title">払い戻し(100円あたり)</div>${payRows}</div>
    ${playerBlocks}
    <button class="btn btn-primary btn-wide" onclick="nextRace()">
      ${S.raceNo < N_RACES ? `第${S.raceNo+1}レースへ` : "最終結果を見る"}</button>
  </div>`;
}
function nextRace(){
  if(S.raceNo < N_RACES){ S.raceNo++; newRace(); }
  else { go("final"); }
}

/* =====================================================
   画面: 最終結果
===================================================== */
function renderFinal(){
  const ranked = S.players.map((p,i)=>({...p, i})).sort((a,b)=>b.money-a.money);
  let rank = 0, prev = null;
  ranked.forEach((p,idx)=>{ if(p.money !== prev){ rank = idx+1; prev = p.money; } p.rank = rank; });
  const diffTotal = (m)=>{ const d = m - S.startMoney; return `<span class="${d>=0?"plus":"minus"}">${d>=0?"+":""}${yen(d)}</span>`; };
  app().innerHTML = `
  <div class="screen">
    <div class="center" style="margin:16px 0 4px;">
      <div class="title-logo" style="font-size:min(10vw,52px);">最終結果</div>
    </div>
    <div class="champ blink">★ 優勝: ${esc(ranked[0].name)} ★</div>
    <div class="board">
      ${ranked.map(p=>`<div class="rank-row ${p.rank===1?"rank-1":""}">
        <span class="rk">${p.rank}位</span>
        <span>${esc(p.name)}</span>
        <span class="mn num led">${yen(p.money)}</span>
        <span style="font-size:13px;" class="num">${diffTotal(p.money)}</span>
      </div>`).join("")}
    </div>
    <div class="btnrow">
      <button class="btn" onclick="go('title')">タイトルへ</button>
      <button class="btn btn-primary" onclick="go('setup')">もう一度あそぶ</button>
    </div>
  </div>`;
}

/* =====================================================
   開発用テスト(自動実行しない): コンソールで __testPayout()
===================================================== */
function __testPayout(){
  const eq = (a,b,msg) => console.log((JSON.stringify(a)===JSON.stringify(b) ? "OK " : "NG ") + msg, a, b);
  // 的中 = 賭け金×オッズ
  let bets = [{pid:0,type:"tansho",sel:[1],units:2,amount:200,odds:3.5,gid:1}];
  let info = settle([1,2,3], {bets, carryIn:0, raceNo:1});
  eq(bets[0].payout, 700, "単勝3.5倍×200円=700円");
  eq(info.carryNext, 0, "的中ありの券種はキャリーなし");
  // 的中ゼロ券種は券種を問わず共通キャリーへ合算
  bets = [
    {pid:0,type:"tansho",sel:[9],units:1,amount:100,odds:5,gid:1},
    {pid:1,type:"sanrentan",sel:[9,8,7],units:3,amount:300,odds:120,gid:2},
  ];
  info = settle([1,2,3], {bets, carryIn:0, raceNo:1});
  eq(info.carryNext, 400, "全ハズレ: 単勝100+三連単300=400が共通キャリーへ");
  // キャリー山分け: 券種問わず的中者全員に賭け金比
  bets = [
    {pid:0,type:"tansho",sel:[1],units:1,amount:100,odds:2.0,gid:1},
    {pid:1,type:"fukusho",sel:[2],units:3,amount:300,odds:1.5,gid:2},
    {pid:1,type:"umaren",sel:[8,9],units:1,amount:100,odds:10,gid:3},
  ];
  info = settle([1,2,3], {bets, carryIn:400, raceNo:2});
  eq(bets[0].payout, 200, "単勝: 100×2.0=200");
  eq(bets[0].carryBonus, 100, "キャリー分配: 400×100/400=100");
  eq(bets[1].carryBonus, 300, "キャリー分配: 400×300/400=300");
  eq(info.potDistributed, 400, "キャリー400を分配済み");
  eq(info.carryNext, 100, "ハズレ馬連100は新たなキャリーへ");
  // 3R目で的中者ゼロ: 残キャリーを購入者へ比例返還
  bets = [
    {pid:0,type:"wide",sel:[1,9],units:1,amount:100,odds:3,gid:1},
    {pid:1,type:"wide",sel:[8,9],units:3,amount:300,odds:4,gid:2},
  ];
  info = settle([1,2,3], {bets, carryIn:400, raceNo:3});
  eq(bets[0].refund, 200, "3R目全ハズレ: (キャリー400+今回400)×100/400=200返還");
  eq(bets[1].refund, 600, "3R目全ハズレ: 800×300/400=600返還");
  eq(info.carryNext, 0, "3R目終了時キャリーは残らない");
  console.log("テスト完了");
}

/* ---------- 起動 ---------- */
go("title");
</script>
